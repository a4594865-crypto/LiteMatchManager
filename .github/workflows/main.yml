name: Build LiteMatchManager Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 【關鍵更新】要求 GitHub 準備 .NET 10 的編譯環境
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Plugin
      run: dotnet build --configuration Release --no-restore

    - name: Upload DLL Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LiteMatchManager-Release
        # 路徑也要跟著更新為 net10.0
        path: bin/Release/net10.0/LiteMatchManager.dll
